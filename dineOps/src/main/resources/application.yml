spring:
  application:
    name: dineOps
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: dineOps
    description: Multi-branch restaurant operations backend
    version: 0.0.1-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-} userId:%X{userId:-}]"

app:
  bootstrap:
    super-admin:
      first-name: ${APP_BOOTSTRAP_SUPER_ADMIN_FIRST_NAME:Super}
      last-name: ${APP_BOOTSTRAP_SUPER_ADMIN_LAST_NAME:Admin}
      email: ${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:super.admin@dineops.local}
      phone: ${APP_BOOTSTRAP_SUPER_ADMIN_PHONE:+212600000001}
      password: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:Admin@123}
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    access-token-expiration-minutes: ${JWT_ACCESS_EXP_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_EXP_DAYS:7}
  security:
    cors:
      allowed-origins: "*"
  jobs:
    low-stock-cron: ${LOW_STOCK_CRON:0 */15 * * * *}
    reservation-reminder-cron: ${RESERVATION_REMINDER_CRON:0 */10 * * * *}
    daily-sales-summary-cron: ${DAILY_SALES_SUMMARY_CRON:0 10 0 * * *}
    refresh-token-cleanup-cron: ${REFRESH_TOKEN_CLEANUP_CRON:0 0 */6 * * *}
