spring:
  config:
    activate:
      on-profile: local
    import: optional:classpath:application-local-private.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dineops?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
