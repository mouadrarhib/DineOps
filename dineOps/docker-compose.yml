services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dineops-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/dineops?sslmode=disable
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: dineops
      SPRING_RABBITMQ_PASSWORD: dineops123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: dineops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dineops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dineops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dineops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dineops-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: dineops
      RABBITMQ_DEFAULT_PASS: dineops123
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
